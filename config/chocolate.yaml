DATASET:
  NAME: 'Chocolate'
  DATA_PATH: 'core/data/lowlight_development/development/Chocolate'
  BACKGROUND_COLOR: 255.0

MODEL:
  NAME: 'Simple3DGS'
  # Gaussian initialization
  NUM_INIT_POINTS: 100000
  SH_DEGREE: 3
  SCENE_SCALE: 2.0
  # Training
  TRAIN_TOTAL_STEP: 90000
  VAL_INTERVAL_STEP: 15000
  LOG_INTERVAL_STEP: 300
  SH_UPGRADE_INTERVAL: 3000
  # Per-parameter learning rates
  LR_MEANS: 1.6e-4
  LR_MEANS_FINAL: 1.6e-6
  LR_QUATS: 1.0e-3
  LR_SCALES: 5.0e-3
  LR_OPACITIES: 5.0e-2
  LR_SH0: 2.5e-3
  LR_SHN: 1.25e-4
  # Appearance branch (NeRF-W style exposure head)
  USE_APPEARANCE: True
  APPEARANCE_DIM: 32
  APPEARANCE_HIDDEN_DIM: 128
  LR_APPEARANCE: 2.5e-3
  TRAIN_TARGET_GAMMA: 1.0
  USE_ADAPTIVE_RENDER_ENHANCE: True
  RENDER_TARGET_MEAN: 0.5
  RENDER_EPS: 1.0e-6
  RENDER_MAX_SCALE: 4.0
  RENDER_GAMMA_BASE: 0.7
  RENDER_GAMMA_SLOPE: 0.6
  RENDER_GAMMA_MIN: 0.4
  RENDER_GAMMA_MAX: 1.2
  # Fallback when USE_ADAPTIVE_RENDER_ENHANCE is False
  RENDER_GAMMA: 1.0
  # Densification (gsplat DefaultStrategy)
  # For long training (90k), keep densification active longer so geometry can
  # continue adapting before entering the late refinement stage.
  DENSIFY_START_STEP: 500
  DENSIFY_STOP_STEP: 22000
  DENSIFY_INTERVAL: 100
  DENSIFY_GRAD_THRESH: 0.0002
  OPACITY_RESET_INTERVAL: 3000
  # Loss
  LAMBDA_SSIM: 0.2
